services:
  logthing:
    build:
      context: .
    image: ${LOGTHING_IMAGE:-logthing:local}
    restart: unless-stopped
    ports:
      - "${LOGTHING_HTTP_PORT:-8080}:8080"
      - "${LOGTHING_SYSLOG_PORT:-5514}:5514/tcp"
      - "${LOGTHING_SYSLOG_PORT:-5514}:5514/udp"
    environment:
      LOGTHING_USERNAME: ${LOGTHING_USERNAME:-admin}
      LOGTHING_PASSWORD: ${LOGTHING_PASSWORD:-secret}
      LOGTHING_HTTP_ADDR: ":8080"
      LOGTHING_SYSLOG_UDP_ADDR: ":5514"
      LOGTHING_SYSLOG_TCP_ADDR: ":5514"
      LOGTHING_SYSLOG_FORMAT: ${LOGTHING_SYSLOG_FORMAT:-automatic}
      LOGTHING_TEST_EVENT_NETWORK: ${LOGTHING_TEST_EVENT_NETWORK:-udp}
      LOGTHING_TEST_EVENT_TARGET: ${LOGTHING_TEST_EVENT_TARGET:-127.0.0.1:5514}
      LOGTHING_DATA_DIR: /data/messages
    volumes:
      - ${LOGTHING_DATA_PATH:-./logthing-data}:/data
